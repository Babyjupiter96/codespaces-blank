name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── Preview deploy (pull requests) ───────────────────────────────────
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --token=$VERCEL_TOKEN --yes 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $DEPLOY_URL"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const sha  = context.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🚀 Vercel Preview Deployment',
                '',
                `**URL:** ${url}`,
                '',
                '| | |',
                '|---|---|',
                `| ✅ Status | Ready |`,
                `| 🌿 Branch | \`${branch}\` |`,
                `| 📦 Commit | \`${sha}\` |`,
              ].join('\n'),
            });

      # ── Production deploy (push to main) ─────────────────────────────────
      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "▲ Deploying to Vercel production..."
          DEPLOY_OUTPUT=$(vercel deploy --token=$VERCEL_TOKEN --yes --prod 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "⚠ Could not parse URL from output. Check Vercel dashboard."
          else
            echo ""
            echo "✅ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅  LIVE URL: $DEPLOY_URL"
            echo "✅ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
