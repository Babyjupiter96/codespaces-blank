name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: apps/web/node_modules
          key: modules-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Cache npm (Vercel CLI)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-vercel-54.4.1

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Install Vercel CLI
        run: npm install -g vercel@54.4.1 --no-audit --no-fund --prefer-offline

      # Use the Vercel REST API (token only) to fetch orgId + projectId
      # and write .vercel/project.json so vercel build can run without
      # needing VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets.
      - name: Create .vercel/project.json via API
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Get user/org ID
          ORG_ID=$(curl -sf "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['user']['id'])")

          # Get project ID by name (from vercel.json: "graystone-web")
          PROJECT_RESP=$(curl -sf "https://api.vercel.com/v9/projects/graystone-web" \
            -H "Authorization: Bearer $VERCEL_TOKEN" || echo "{}")
          PROJECT_ID=$(echo "$PROJECT_RESP" | \
            python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

          # If project doesn't exist yet, create it
          if [ -z "$PROJECT_ID" ]; then
            echo "Project not found — creating graystone-web..."
            PROJECT_ID=$(curl -sf -X POST "https://api.vercel.com/v10/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"graystone-web","framework":"nextjs"}' | \
              python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          fi

          echo "ORG_ID    : $ORG_ID"
          echo "PROJECT_ID: $PROJECT_ID"

          mkdir -p .vercel
          echo "{\"orgId\":\"$ORG_ID\",\"projectId\":\"$PROJECT_ID\"}" > .vercel/project.json

      - name: Build
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      # ── Preview (pull requests) ───────────────────────────────────────────
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview: $URL"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview\n\n**URL:** ${url}\n**Commit:** \`${context.sha.slice(0,7)}\``,
            });

      # ── Production (push to main) ─────────────────────────────────────────
      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          OUTPUT=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo ""
          echo "=========================================="
          echo "LIVE URL: $URL"
          echo "=========================================="
