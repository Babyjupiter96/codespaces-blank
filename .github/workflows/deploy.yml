name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: apps/web/node_modules
          key: modules-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npm ci --no-audit --no-fund --prefer-offline

      # Link, pull settings, and build all in one step so .vercel/project.json
      # is guaranteed to exist in the same shell context when pull and build run.
      - name: Link, Pull & Build
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@54.4.1 link --project graystone-web --yes --token=$VERCEL_TOKEN
          npx vercel@54.4.1 pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel@54.4.1 build --prod --token=$VERCEL_TOKEN

      # ── Preview (pull requests) ───────────────────────────────────────────
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL=$(npx vercel@54.4.1 deploy --prebuilt --token=$VERCEL_TOKEN 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview: $URL"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview\n\n**URL:** ${url}\n**Commit:** \`${context.sha.slice(0,7)}\``,
            });

      # ── Production (push to main) ─────────────────────────────────────────
      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          OUTPUT=$(npx vercel@54.4.1 deploy --prebuilt --prod --token=$VERCEL_TOKEN 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo ""
          echo "=========================================="
          echo "LIVE URL: $URL"
          echo "=========================================="
