name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache both node_modules AND the npm download cache
      # so neither npm ci nor npm install -g hits the network on repeat runs
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: apps/web/node_modules
          key: modules-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Cache npm global (Vercel CLI)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-vercel-54.4.1

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Install Vercel CLI
        run: npm install -g vercel@54.4.1 --no-audit --no-fund --prefer-offline

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL=$(vercel deploy --token=$VERCEL_TOKEN --yes 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview: $URL"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment\n\n**URL:** ${url}\n**Commit:** \`${context.sha.slice(0,7)}\``,
            });

      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          OUTPUT=$(vercel deploy --prod --token=$VERCEL_TOKEN --yes 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo ""
          echo "=========================================="
          echo "LIVE URL: $URL"
          echo "=========================================="
