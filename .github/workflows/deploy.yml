name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@54.4.1

      # All Vercel commands run from repo root. rootDirectory=apps/web in the
      # Vercel project settings tells the CLI where the app lives — running the
      # CLI inside apps/web double-paths the root and produces empty route output.
      - name: Pull project settings
        run: |
          vercel pull --yes --environment=production \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="jack-bamis-projects"

      - name: Build
        run: |
          vercel build --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="jack-bamis-projects"

      # ── Preview (pull requests) ───────────────────────────────────────────
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          URL=$(vercel deploy --prebuilt \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="jack-bamis-projects" 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview: $URL"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview\n\n**URL:** ${url}\n**Commit:** \`${context.sha.slice(0,7)}\``,
            });

      # ── Production (push to main) ─────────────────────────────────────────
      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          OUTPUT=$(vercel deploy --prebuilt --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="jack-bamis-projects" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo ""
          echo "=========================================="
          echo "LIVE URL: $URL"
          echo "=========================================="
